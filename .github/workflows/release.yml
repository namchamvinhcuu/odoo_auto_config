name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "{\"version\": \"$VERSION\"}" > assets/version.json
          mkdir -p lib/generated
          echo "// AUTO-GENERATED by CI. DO NOT EDIT manually." > lib/generated/version.dart
          echo "const String appVersion = '$VERSION';" >> lib/generated/version.dart

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Build Linux
        run: flutter build linux --release

      - name: Download appimagetool
        run: |
          curl -fsSL -o /tmp/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool

      - name: Create AppImage
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          APPDIR="build/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR"
          cp -r "$BUNDLE/"* "$APPDIR/"
          cp workspaces.png "$APPDIR/workspace-configuration.png"

          cat > "$APPDIR/workspace-configuration.desktop" <<EOF
          [Desktop Entry]
          Name=Workspace Configuration
          Exec=WorkspaceConfiguration
          Icon=workspace-configuration
          Type=Application
          Categories=Development;
          EOF

          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/WorkspaceConfiguration" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run --no-appstream "$APPDIR" build/WorkspaceConfiguration.AppImage

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/WorkspaceConfiguration.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "{\"version\": \"$VERSION\"}" > assets/version.json
          mkdir -p lib/generated
          echo "// AUTO-GENERATED by CI. DO NOT EDIT manually." > lib/generated/version.dart
          echo "const String appVersion = '$VERSION';" >> lib/generated/version.dart

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/odoo_auto_config.app"
          DMG_PATH="build/WorkspaceConfiguration.dmg"
          TMP_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$TMP_DIR/Workspace Configuration.app"
          ln -s /Applications "$TMP_DIR/Applications"
          hdiutil create -volname "Workspace Configuration" -srcfolder "$TMP_DIR" -ov -format UDZO "$DMG_PATH"
          rm -rf "$TMP_DIR"

      - name: Create ZIP for auto-update
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent odoo_auto_config.app ../../../WorkspaceConfiguration-macOS.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/WorkspaceConfiguration.dmg
            build/WorkspaceConfiguration-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "{\"version\": \"$VERSION\"}" > assets/version.json
          mkdir -p lib/generated
          echo "// AUTO-GENERATED by CI. DO NOT EDIT manually." > lib/generated/version.dart
          echo "const String appVersion = '$VERSION';" >> lib/generated/version.dart

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Build Windows
        run: flutter build windows --release

      - name: Create MSIX
        run: dart run msix:create --build-windows false --install-certificate false --output-name WorkspaceConfiguration

      - name: Copy installer files
        run: |
          Copy-Item certificate.pfx build/windows/x64/runner/Release/
          Copy-Item install.ps1 build/windows/x64/runner/Release/
          Copy-Item install.bat build/windows/x64/runner/Release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/WorkspaceConfiguration.msix
            build/windows/x64/runner/Release/certificate.pfx
            build/windows/x64/runner/Release/install.ps1
            build/windows/x64/runner/Release/install.bat

  publish-public:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p assets
          gh release download "$TAG" \
            --repo namchamvinhcuu/odoo_auto_config \
            --dir assets

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release create "$TAG" \
            --repo namchamvinhcuu/workspace-configuration \
            --title "Workspace Configuration $TAG" \
            --notes "## Download & Install

          | Platform | File | Size |
          |----------|------|------|
          | Linux | \`WorkspaceConfiguration.AppImage\` | ~17 MB |
          | macOS | \`WorkspaceConfiguration.dmg\` | ~19 MB |
          | Windows | \`WorkspaceConfiguration.msix\` | ~14 MB |

          ---

          ### Linux
          \`\`\`bash
          chmod +x WorkspaceConfiguration.AppImage
          ./WorkspaceConfiguration.AppImage
          \`\`\`

          ### macOS
          1. Open \`WorkspaceConfiguration.dmg\`
          2. Drag app to **Applications**
          3. Double-click to launch — macOS will block it
          4. Go to **System Settings** > **Privacy & Security**
          5. Find the blocked message > click **Open Anyway** > enter password > **Open**

          > If you see \"App is damaged\", run: \`xattr -cr /Applications/Workspace\\ Configuration.app\`

          ### Windows
          1. Download **all 4 files** (\`.msix\`, \`.pfx\`, \`.ps1\`, \`.bat\`)
          2. Place them in the **same folder**
          3. Right-click \`install.bat\` > **Run as Administrator**
          4. Launch from **Start Menu**

          ---
          See [README](https://github.com/namchamvinhcuu/workspace-configuration#readme) for full usage guide." \
            assets/*
